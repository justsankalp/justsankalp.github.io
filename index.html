<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sankalp Karthi Senthilkumar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Inter:wght@300;400&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #030303; /* Near absolute black */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            text-align: center;
            -webkit-font-smoothing: antialiased;
        }

        .minimal-card {
            animation: emerge 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 4vw, 3.5rem);
            color: #F8F8F8;
            font-weight: 500;
            letter-spacing: 3px;
            margin: 0 0 12px 0;
        }

        h2 {
            font-size: clamp(0.75rem, 1.5vw, 0.95rem);
            color: #7A7A7A;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 300;
            margin: 0 0 45px 0;
        }

        .contact-link {
            font-size: 0.95rem;
            color: #D4AF37; /* Royal Gold accent */
            text-decoration: none;
            letter-spacing: 1.5px;
            font-weight: 400;
            padding-bottom: 4px;
            border-bottom: 1px solid transparent;
            transition: border-color 0.4s ease, opacity 0.4s ease;
        }

        .contact-link:hover {
            border-color: #D4AF37;
            opacity: 0.8;
        }

        @keyframes emerge {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="minimal-card">
        <h1>Sankalp Karthi Senthilkumar</h1>
        <h2>AI Transformation Strategist</h2>
        <a href="mailto:sankalp.karthi@gmail.com" class="contact-link">sankalp.karthi@gmail.com</a>
    </div>

</body>
</html>
